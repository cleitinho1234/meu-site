<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edilane ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#ffe6f0;
}

/* FUNDO COM FOTOS */

.fundo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0.15;
z-index:-2;
transition:background-image 2s;
}

/* TEXTO */

#primeiroTexto{
position:fixed;
top:10px;
width:100%;
text-align:center;
font-size:28px;
color:#ff1a75;
font-weight:bold;
display:none;
z-index:1000;
}

/* ESTRELAS */

.estrela{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.8;
animation:piscar 2s infinite alternate;
}

@keyframes piscar{
0%{opacity:0.2;}
100%{opacity:1;}
}

/* TITULO */

h1{
text-align:center;
margin-top:40px;
color:#ff1a75;
}

/* TEXTO */

p{
text-align:center;
font-size:20px;
margin-bottom:30px;
}

/* FOTOS */

.foto{
position:absolute;
width:120px;
height:120px;
border-radius:12px;
object-fit:cover;
cursor:pointer;
transition:transform 0.3s;
}

.foto:hover{
transform:scale(1.1);
}

/* CORAÇÕES SUBINDO */

.coracao{
position:absolute;
font-size:20px;
opacity:0.6;
animation:flutuar linear infinite;
}

@keyframes flutuar{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100vh);}
}

/* VISUALIZADOR */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.viewer img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.voltar{
position:absolute;
top:20px;
left:20px;
font-size:40px;
color:white;
cursor:pointer;
}

/* PARTICULAS */

.particle{
position:absolute;
font-size:20px;
pointer-events:none;
animation:explode 1s linear forwards;
}

@keyframes explode{
0%{opacity:1; transform:translate(0,0);}
100%{opacity:0; transform:translate(var(--x),var(--y));}
}

</style>
</head>

<body>

<div class="fundo" id="fundo"></div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="primeiroTexto">Nosso Primeiro Encontro ❤️</div>

<h1>Edilane Santos ❤️</h1>

<p>
Com muito carinho ❤️<br><br>
<strong>De Alisson Da Cruz Silva</strong><br>
para<br>
<strong>Edilane Santos</strong><br><br>
Obrigado por ser minha namorada e fazer minha vida mais feliz.
</p>

<img src="foto1.jpg" class="foto">
<img src="foto2.jpg" class="foto">
<img src="foto3.jpg" class="foto">
<img src="foto4.jpg" class="foto">
<img src="foto5.jpg" class="foto">
<img src="foto6.jpg" class="foto primeiro">
<img src="foto7.jpg" class="foto">
<img src="foto8.jpg" class="foto">

<div class="viewer" id="viewer">
<div class="voltar" onclick="fechar()">⬅</div>
<img id="imagemGrande">
</div>

<script>

/* MUSICA */

const musica = document.getElementById("musica")
let musicaIniciada=false

function tocarMusica(){

if(musicaIniciada) return

musicaIniciada=true
musica.volume=0
musica.play().catch(()=>{})

let volume=0

let fade=setInterval(()=>{

if(volume<1){
volume+=0.02
musica.volume=volume
}else{
clearInterval(fade)
}

},200)

}

window.addEventListener("load",tocarMusica)
document.addEventListener("click",tocarMusica)

/* FUNDO COM FOTOS */

const fotosFundo=[
"foto1.jpg",
"foto2.jpg",
"foto3.jpg",
"foto4.jpg",
"foto5.jpg",
"foto6.jpg",
"foto7.jpg",
"foto8.jpg"
]

let fundo=document.getElementById("fundo")
let indice=0

function trocarFundo(){

fundo.style.backgroundImage="url("+fotosFundo[indice]+")"

indice++

if(indice>=fotosFundo.length){
indice=0
}

}

trocarFundo()
setInterval(trocarFundo,5000)

/* ESTRELAS */

for(let i=0;i<80;i++){

let estrela=document.createElement("div")
estrela.className="estrela"

estrela.style.left=Math.random()*100+"vw"
estrela.style.top=Math.random()*100+"vh"

document.body.appendChild(estrela)

}

/* FOTOS */

const fotos=document.querySelectorAll(".foto")
const viewer=document.getElementById("viewer")
const imagemGrande=document.getElementById("imagemGrande")

fotos.forEach(foto=>{

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-120)
let dx=(Math.random()-0.5)*2
let dy=(Math.random()-0.5)*2

foto.style.left=x+"px"
foto.style.top=y+"px"

function mover(){

x+=dx
y+=dy

if(x<0||x+120>window.innerWidth) dx*=-1
if(y<0||y+120>window.innerHeight) dy*=-1

foto.style.left=x+"px"
foto.style.top=y+"px"

requestAnimationFrame(mover)

}

mover()

foto.addEventListener("click",(e)=>{

let x=e.clientX
let y=e.clientY

explodirCoracoes(x,y)

imagemGrande.src=foto.src
viewer.style.display="flex"

if(foto.classList.contains("primeiro")){

document.getElementById("primeiroTexto").style.display="block"

setTimeout(()=>{

let centroX=window.innerWidth/2
let centroY=window.innerHeight/2

for(let i=0;i<30;i++){
explodirCoracoes(centroX,centroY)
}

},200)

}

})

})

function fechar(){
viewer.style.display="none"
}

/* CORAÇÕES */

function explodirCoracoes(x,y){

for(let i=0;i<25;i++){

let heart=document.createElement("div")
heart.className="particle"
heart.innerHTML="❤️"

let dx=(Math.random()*300)-150
let dy=(Math.random()*300)-150

heart.style.setProperty('--x',dx+'px')
heart.style.setProperty('--y',dy+'px')

heart.style.left=x+"px"
heart.style.top=y+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

}

/* CORAÇÕES SUBINDO */

function criarCoracoes(){

let heart=document.createElement("div")
heart.className="coracao"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),10000)

}

setInterval(criarCoracoes,800)

</script>

</body>
</html>
