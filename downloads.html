<!DOCTYPE html>
<html>
<head>
    <title>Seus Downloads</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url("luffy-fundo.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffcc00;
            text-shadow:
                0 0 10px #ff0000,
                0 0 20px #ff7300,
                0 0 30px #ffcc00;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px; /* deixa o texto mais pra cima */
        }

        .titulo {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 50px; /* espaço para os futuros botões de download */
            text-align: center;
        }

        .download-item {
            width: 300px;
            padding: 15px 25px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff0000, #ff7300);
            color: white;
            border-radius: 15px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff0000;
            transition: 0.3s;
        }

        .download-item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff7300;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="titulo">AQUI ESTÁ SEUS DOWNLOADS</div>

        <!-- Aqui vamos adicionar os botões de download futuramente -->
        <!-- <div class="download-item">Download 1</div> -->
        <!-- <div class="download-item">Download 2</div> -->
    </div>
</body>
</html>
