<!DOCTYPE html>
<html>
<head>
<title>Seus Downloads</title>

<style>

body{
margin:0;
height:100vh;
font-family:Arial;

background-image:url("luffy-fundo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

color:white;
}

/* AJUSTE PARA CELULAR */
@media (max-width:768px){

body{
background-size:contain;
background-position:center top;
background-color:black;
}

}

.container{
display:flex;
flex-direction:column;
align-items:center;
padding-top:60px;
}

.titulo{
font-size:40px;
color:#ffcc00;
text-shadow:0 0 10px red;
margin-bottom:40px;
text-align:center;
}

.download{
display:flex;
align-items:center;
background:rgba(0,0,0,0.6);
padding:15px 20px;
border-radius:15px;
width:350px;
margin-bottom:20px;
box-shadow:0 0 20px red;
}

.download img{
width:45px;
margin-right:15px;
}

.nome{
flex:1;
font-size:20px;
}

.botao{
background:linear-gradient(45deg,#ff0000,#ff7300);
border:none;
color:white;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.botao:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="container">

<div class="titulo">
AQUI ESTÁ SEUS DOWNLOADS
</div>

<div class="download">

<img src="delta.png">

<div class="nome">
Delta Executor
</div>

<a href="delta.html">
<button class="botao">
Baixar
</button>
</a>

</div>

</div>

</body>
</html>
