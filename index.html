<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Edilane</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      margin: 0;
      font-family: 'Arial', sans-serif;
    }

    .heart-button {
      width: 150px;
      height: 150px;
      background: red;
      position: relative;
      transform: rotate(-45deg);
      cursor: pointer;
      animation: beat 1s infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      border: none;
      outline: none;
    }

    .heart-button::before,
    .heart-button::after {
      content: "";
      width: 150px;
      height: 150px;
      background: red;
      border-radius: 50%;
      position: absolute;
    }

    .heart-button::before {
      top: -75px;
      left: 0;
    }

    .heart-button::after {
      left: 75px;
      top: 0;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1) rotate(-45deg); }
      50% { transform: scale(1.2) rotate(-45deg); }
    }
  </style>
</head>
<body>
  <button class="heart-button" onclick="redirect()">Eu te amo ❤️</button>

  <script>
    function redirect() {
      window.location.href = 'presente.html';
    }
  </script>
</body>
</html>
