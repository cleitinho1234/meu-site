<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Edilane ❤️</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#e6a1a1;
overflow:hidden;
font-family:Arial;
}

.container{
position:relative;
cursor:pointer;
}

.heart{
width:220px;
height:220px;
background:red;
position:relative;
transform:rotate(-45deg);
animation:beat 1s infinite;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:220px;
height:220px;
background:red;
border-radius:50%;
}

.heart:before{
top:-110px;
left:0;
}

.heart:after{
left:110px;
top:0;
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:24px;
font-weight:bold;
text-align:center;
}

@keyframes beat{
0%,100%{transform:scale(1) rotate(-45deg);}
50%{transform:scale(1.15) rotate(-45deg);}
}

.particle{
position:absolute;
font-size:20px;
pointer-events:none;
animation:fly 1s linear forwards;
}

@keyframes fly{
0%{opacity:1; transform:translate(0,0);}
100%{opacity:0; transform:translate(var(--x),var(--y));}
}

</style>
</head>

<body>

<div class="container" onclick="loveClick()">

<div class="heart"></div>

<div class="text">Eu te amo ❤️</div>

</div>

<script>

function loveClick(){

for(let i=0;i<25;i++){

let heart=document.createElement("div")
heart.className="particle"
heart.innerHTML="❤️"

let x=(Math.random()*300)-150
let y=(Math.random()*300)-150

heart.style.setProperty('--x',x+'px')
heart.style.setProperty('--y',y+'px')

heart.style.left=window.innerWidth/2+"px"
heart.style.top=window.innerHeight/2+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

setTimeout(()=>{
window.location.href="presente.html"
},1000)

}

</script>

</body>
</html>
