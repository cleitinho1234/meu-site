<!DOCTYPE html>
<html>
<head>
    <title>Meu Site</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;

            background-image: url("luffy-fundo.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 80px;
            font-size: 42px;
            font-weight: bold;

            background: linear-gradient(45deg, #ff0000, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow:
                0 0 10px #ff0000,
                0 0 20px #ff7300,
                0 0 30px #ffcc00;
        }

        .botao-container {
            position: absolute;
            animation: mover 80s infinite alternate ease-in-out;
        }

        .botao-container img {
            display: block;
            margin: 0 auto -25px auto;
            width: 130px;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.7));
        }

        .botao {
            padding: 20px 50px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, #ff0000, #ff7300);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 25px #ff0000;
            transition: 0.3s;
        }

        .botao:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff7300;
        }

        @keyframes mover {
            0%   { top: 60%; left: 10%; }
            50%  { top: 50%; left: 60%; }
            100% { top: 70%; left: 80%; }
        }
    </style>
</head>

<body>

    <h1>Clique no botão abaixo para prosseguir</h1>

    <div class="botao-container">
        <img src="luffy.png">
        <button class="botao" onclick="proximo()">
            Prosseguir
        </button>
    </div>

    <script>
        function proximo() {
            alert("MUITO BEM COMPANHEIRO 🏴‍☠️🔥");
            // Abre a página downloads.html em uma nova aba
            window.open("downloads.html";
        }
    </script>

</body>
</html>
