<!DOCTYPE html>
<html>
<head>
    <title>Meu Primeiro Site</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 150px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #00ff88;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #00cc6a;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Eu estou virando programador 🚀</h1>
        <p>Esse é meu primeiro site profissional.</p>

        <button onclick="mostrarMensagem()">
            Clique aqui
        </button>
    </div>

    <script>
        function mostrarMensagem() {
            alert("Você está evoluindo 🔥");
        }
    </script>
</body>
</html>
